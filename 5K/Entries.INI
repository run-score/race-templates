* Race Configuration for the 5K Sample Race
*
* Purpose:          Defines race settings, user variables, and data-loading
*                   rules for the sample 5K race.
*

* --- Race Information ---
race name           Vernon 5K
date format         MM/DD/YY
race date           06/20/2009
date of birth field birthdate
%full name%         Thirty-Ninth Annual Vernon V
%temp_dir%          c:\tmp
age field           AGE

* --- Chip/Bib Configuration ---
bib or chip         chip
chip fields         1

* --- Unregistered Runner Settings ---
Not found added     yes
unregistered number 20000
Edit Results        both

* --- RaceRoster Integration ---
%rr_5k%             238944
%rr_5k_u%           297655
%rr_5k_awards_u%    283746
%resultsid5k%       hn9utx3bemev3vqd

* --- Awards Event ---
*     The event name used by all awards macros (OVERALL.RSM, AGERES.RSM, etc.)
%awards_event%      Finish

* --- SMS Configuration ---
Sms Provider        twilio
Sms Api Key         <<<<< ENTER YOUR KEY HERE >>>>>>
No Sms Warning
Sms From Phone      <<<<< ENTER FROM NUMBER HERE >>>>>>

* --- Email Configuration (SendGrid) ---
*     RunScore requires a Web API integration with your SendGrid account.
*     Please see the manual for setup instructions.
%email_apikey%      your-sendgrid-web-api-key
%email_from%        your-email@example.com
%email_subject%     Vernon 5K

* --- Load Chips: assigns chip number to a bib ---
[control]
select              bib
=                   %1
selected            chip
selected message    %2
[data]
.include            data\bibchip.txt


* --- Assign Divisions: sets DIV field based on sex and age ---
[control]
select              sex
EQ                  %1
and
select              age
GE                  %2
and
select              age
LE                  %3
selected            DIV
selected message    %4
[data]
M  1 19 M0119
F  1 19 F0119
M 20 29 M2029
F 20 29 F2029
M 30 39 M3039
F 30 39 F3039
M 40 49 M4049
F 40 49 F4049
M 50 59 M5059
F 50 59 F5059
M 60 99 M6099
F 60 99 F6099


* --- Build Full Name from First + Last ---
[control]
Selected            Name
Selected Value      First Name
Selected Value      Last Name

* --- Set Result URL for each runner ---
[control]
Selected            Result URL
Selected Message    https://results.raceroster.com/v3/events/%resultsid5k%